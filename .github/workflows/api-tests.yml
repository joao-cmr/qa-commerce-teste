name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start application
        run: npm run start &

      - name: Wait for app
        run: npx wait-on http://localhost:3000/api-docs/ 

      - name: Check API Health (Debug)
        run: |
          echo "Testando conexão com a API..."
          curl -I http://localhost:3000/api-docs/
          echo "Testando rota de usuários..."
          curl -v http://localhost:3000/api/users || echo "Rota /api/users não respondeu"

      - name: Create Env File
        run: |
          mkdir -p API/postman/environments
          echo '${{ secrets.POSTMAN_ENV_JSON }}' > API/postman/environments/qa-commerce.postman_environment.json


      - name: Run API tests
        run: npm run test:api:login

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: reports/api/